<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button class="move-btn" onclick="playGame('rock')">
      <img class="move-icon" src="images/rock-emoji.png" alt="Rock" />
    </button>
    <button class="move-btn" onclick="playGame('paper')">
      <img class="move-icon" src="images/paper-emoji.png" alt="Paper" />
    </button>
    <button class="move-btn" onclick="playGame('scissors')">
      <img class="move-icon" src="images/scissors-emoji.png" alt="Scissors" />
    </button>

    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>

    <button
      class="reset-score-btn"
      onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();
      "
    >
      Reset Score
    </button>

    <button class="auto-play-btn" onclick="autoplay()">Auto Play</button>

    <script src="main.js"></script>
  </body>
</html>
