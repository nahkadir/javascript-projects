<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .cost-input {
        font-size: 15px;
        padding: 10px;
      }

      .calculate-btn {
        font-size: 15px;
        background-color: green;
        color: white;
        border: none;
        padding: 11px 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping</p>
    <p>Orders over $40 = FREE shipping</p>
    <input
      onkeydown="handleCostKeydown(event)"
      class="js-cost-input cost-input"
      type="number"
      placeholder="Cost of order"
    />
    <button class="calculate-btn" onclick="calculateTotal()">Calculate</button>
    <p class="js-total-cost"></p>

    <script>
      function calculateTotal() {
        const inputEle = document.querySelector(".js-cost-input");
        let cost = Number(inputEle.value);

        if (cost < 40) {
          cost += 10;
        }

        document.querySelector(".js-total-cost").innerHTML = `$${cost}`;
      }

      function handleCostKeydown(event) {
        if (event.key === "Enter") {
          calculateTotal();
        }
      }
    </script>
  </body>
</html>
